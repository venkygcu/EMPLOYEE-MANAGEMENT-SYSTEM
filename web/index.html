<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <section id="loginSection" class="panel">
            <h1>Employee Management System</h1>
            <p>Sign in to manage employee records</p>
            <form id="loginForm">
                <input type="text" id="username" name="username" placeholder="Username" required>
                <input type="password" id="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <div id="loginMessage" class="message"></div>
        </section>

        <section id="dashboardSection" class="hidden">
            <div class="header-row">
                <h2>Employee Dashboard</h2>
                <button id="logoutBtn" class="secondary">Logout</button>
            </div>

            <div class="grid">
                <form id="employeeForm" class="card">
                    <h3 id="formTitle">Add Employee</h3>
                    <input type="hidden" id="empId" name="empId">
                    <div class="row">
                        <input type="text" id="name" name="name" placeholder="Name" required>
                        <input type="text" id="fatherName" name="fatherName" placeholder="Father's Name">
                    </div>
                    <div class="row">
                        <input type="text" id="dob" name="dob" placeholder="DOB (YYYY-MM-DD)">
                        <input type="text" id="salary" name="salary" placeholder="Salary">
                    </div>
                    <div class="row">
                        <input type="text" id="address" name="address" placeholder="Address">
                        <input type="text" id="phone" name="phone" placeholder="Phone">
                    </div>
                    <div class="row">
                        <input type="email" id="email" name="email" placeholder="Email">
                        <input type="text" id="education" name="education" placeholder="Education">
                    </div>
                    <div class="row">
                        <input type="text" id="designation" name="designation" placeholder="Designation">
                        <input type="text" id="aadhar" name="aadhar" placeholder="Aadhar Number">
                    </div>
                    <div class="actions">
                        <button type="submit" id="submitBtn">Save Employee</button>
                        <button type="button" id="cancelEditBtn" class="secondary hidden">Cancel</button>
                    </div>
                    <div id="employeeMessage" class="message"></div>
                </form>

                <div class="card">
                    <div class="header-row">
                        <h3>Employee Directory</h3>
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Search by ID or name">
                            <button id="searchBtn">Search</button>
                        </div>
                    </div>
                    <table id="employeeTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Designation</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
